services:

  db:
    image: postgres:15
    container_name: sb-ecom-db
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - sb-ecom-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    image: gangadarans/sb-ecom-backend:latest
    container_name: sb-ecom-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecommerce
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8080:8080"
    networks:
      - sb-ecom-network

  frontend:
    image: gangadarans/sb-ecom-frontend:latest
    container_name: sb-ecom-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - sb-ecom-network

volumes:
  db_data:

networks:
  sb-ecom-network: